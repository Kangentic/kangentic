name: Build

# DISABLED: Previously ran `npm run make` on 4 OS runners per push/PR, which
# hung for ~7 hours on Windows and exhausted all GitHub Actions credits.
# To re-enable, uncomment the push/pull_request triggers below.
on:
  workflow_dispatch:
#   push:
#     branches: [main]
#   pull_request:
#     branches: [main]

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run typecheck

      - run: npm run test:unit
